<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValleHealth – Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a5276;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 360px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            text-align: center;
        }
        .login-box h1 { font-size: 1.8rem; color: #1a5276; margin-bottom: 8px; }
        .login-box p { color: #888; margin-bottom: 24px; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #1a5276;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background: #2e86c1; }
        .error { color: #e74c3c; font-size: 0.85rem; margin-top: 12px; }
        .volver { display: block; margin-top: 16px; color: #2e86c1; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="login-box">
    <h1>🏥 ValleHealth</h1>
    <p>Ingresa con tu cuenta de profesional</p>
    <input type="email" id="email" placeholder="Correo electrónico">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="login()">Iniciar sesión</button>
    <div class="error" id="error"></div>
    <a class="volver" href="index.html">← Volver al inicio</a>
</div>

<script>
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
        document.getElementById("error").textContent = "Por favor completa todos los campos.";
        return;
    }

    try {
        const res = await fetch(`http://127.0.0.1:8000/login?email=${email}&password=${password}`, { method: "POST" });
        const data = await res.json();

        if (res.ok) {
            localStorage.setItem("rol", data.rol);
            localStorage.setItem("email", email);
            window.location.href = "admin.html";
        } else {
            document.getElementById("error").textContent = "Credenciales incorrectas.";
        }
    } catch(e) {
        document.getElementById("error").textContent = "Error conectando con el servidor.";
    }
}
</script>
</body>
</html>
